function _nullishCoalesce(lhs, rhsFn) { if (lhs != null) { return lhs; } else { return rhsFn(); } } function _optionalChain(ops) { let lastAccessLHS = undefined; let value = ops[0]; let i = 1; while (i < ops.length) { const op = ops[i]; const fn = ops[i + 1]; i += 2; if ((op === 'optionalAccess' || op === 'optionalCall') && value == null) { return undefined; } if (op === 'access' || op === 'optionalAccess') { lastAccessLHS = value; value = fn(value); } else if (op === 'call' || op === 'optionalCall') { value = fn((...args) => value.call(lastAccessLHS, ...args)); lastAccessLHS = undefined; } } return value; }const { useState, useRef, useEffect } = React;

function moveCam(camera, a, target) {
  const t = (a.phi * Math.PI) / 180, p = (a.theta * Math.PI) / 180;
  camera.position.set(
    target.x + a.radius * Math.sin(t) * Math.sin(p),
    target.y + a.radius * Math.cos(t),
    target.z + a.radius * Math.sin(t) * Math.cos(p)
  );
  camera.lookAt(target);
}

function makeMarble() {
  const W = 512, H = 256;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  // Warm white base
  ctx.fillStyle = '#f2f0eb';
  ctx.fillRect(0, 0, W, H);
  // Subtle cloud wash
  const grad = ctx.createRadialGradient(W*0.6, H*0.4, 10, W*0.6, H*0.4, W*0.55);
  grad.addColorStop(0, 'rgba(220,218,213,0.18)');
  grad.addColorStop(1, 'rgba(242,240,235,0)');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  // Gray veins
  const veins = [
    [0,   60,  '#b5b2ad', 1.6, 0.40],
    [130, 10,  '#c2bfba', 1.1, 0.30],
    [0,   150, '#aeaba6', 1.0, 0.28],
    [260, 195, '#cecbc6', 2.6, 0.18],
    [55,  220, '#a5a29d', 0.9, 0.34],
    [390, 45,  '#c8c5c0', 1.4, 0.24],
    [180, 100, '#b8b5b0', 0.7, 0.22],
  ];
  veins.forEach(([sx, sy, col, lw, alpha]) => {
    ctx.save();
    ctx.globalAlpha = alpha; ctx.strokeStyle = col;
    ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.beginPath();
    let x = sx, y = sy; ctx.moveTo(x, y);
    while (x < W + 60) {
      const nx = x + 50 + Math.random() * 75;
      const ny = y + (Math.random() - 0.5) * 65;
      ctx.quadraticCurveTo(x+(nx-x)*0.4+(Math.random()-0.5)*38, y+(Math.random()-0.5)*48, nx, ny);
      x = nx; y = ny;
    }
    ctx.stroke(); ctx.restore();
  });
  return new THREE.CanvasTexture(cv);
}

// Per-layout room dimensions. Walls hug each layout's own contents (min 0.5ft
// breathing room) but never shrink below the stated room size. Computed per
// layout so a large U-shape layout never inflates the room for a smaller one.
function roomDims(layout, result) {
  const cabs = (layout && layout.cabinets) || [];
  const apps = (layout && layout.appliances) || [];
  const all  = [...cabs, ...apps];
  const maxX = all.length ? Math.max(...all.map(o => (o.x || 0) + (o.width  || 0))) : 0;
  const maxZ = all.length ? Math.max(...all.map(o => (o.z || 0) + (o.depth  || 0))) : 0;
  const fitW = Math.ceil((maxX + 0.5) * 2) / 2;
  const fitL = Math.ceil((maxZ + 0.5) * 2) / 2;
  const statedW = result.estimated_width_ft || 0;
  return {
    // Width is pinned to the stated back-wall dimension so a perpendicular
    // side-wall run extends the room's DEPTH (z), never inflates its width.
    // Only fall back to fitting cabinets if no width was provided at all.
    RW: statedW > 0 ? statedW : fitW,
    // Depth still grows to contain islands / side runs that reach past the
    // stated depth, since those legitimately extend front-to-back.
    RL: Math.max(result.estimated_length_ft || 0, fitL),
    RH: result.ceiling_height_ft || 9,
  };
}

// Is an appliance's centre inside this island's footprint? (used to render
// island sinks integrated into the island instead of as a floating box)
function isInsideIsland(app, island) {
  const cx = (app.x || 0) + (app.width || 0) / 2;
  const cz = (app.z || 0) + (app.depth || 0) / 2;
  return cx >= island.x && cx <= island.x + island.width &&
         cz >= island.z && cz <= island.z + island.depth;
}

// Convert a wall-relative item {wall,pos,length} into the app's {x,z,width,depth}.
// Items already given as x/z (e.g. islands, or the demo) pass through unchanged.
function _depthInto(type) { return type === "upper" ? 1.25 : 2; }
function placeOnWall(item, RW, isAppliance) {
  const w = item.wall;
  if (w === "back" || w === "left" || w === "right") {
    const into = isAppliance
      ? (item.into != null ? item.into : (item.type === "fridge" ? 2.5 : 2))
      : _depthInto(item.type);
    const len = item.length != null ? item.length : (item.width != null ? item.width : into);
    const pos = item.pos != null ? item.pos : 0;
    let x, z, width, depth;
    if (w === "back")  { x = pos;                      z = 0;   width = len;  depth = into; }
    if (w === "left")  { x = 0;                        z = pos; width = into; depth = len;  }
    if (w === "right") { x = Math.max(0, RW - into);   z = pos; width = into; depth = len;  }
    const out = Object.assign({}, item, { x, z, width, depth });
    delete out.wall; delete out.pos; delete out.length; delete out.into;
    return out;
  }
  return item; // island / legacy x-z item
}
// Normalize every layout in a parsed result from wall-relative to x/z form.
function normalizeWalls(parsed) {
  const RW = parsed.estimated_width_ft || 12;
  (parsed.layouts || []).forEach(L => {
    L.cabinets   = (L.cabinets   || []).map(c => placeOnWall(c, RW, false));
    L.appliances = (L.appliances || []).map(a => placeOnWall(a, RW, true));
  });
  return parsed;
}

// Carve gaps in base/upper cabinet runs where a full appliance sits, and lift the
// cabinet that sits ABOVE the fridge so it rests on top instead of clipping through.
function _edgesWithin(s, e, intervals){
  const pts=[s,e];
  intervals.forEach(iv=>{ if(iv[0]>s+0.001 && iv[0]<e-0.001) pts.push(iv[0]); if(iv[1]>s+0.001 && iv[1]<e-0.001) pts.push(iv[1]); });
  return Array.from(new Set(pts)).sort((a,b)=>a-b);
}
function _inAny(m, intervals){ return intervals.some(iv => m>iv[0] && m<iv[1]); }
function splitCabinetsAroundAppliances(cabinets, appliances, RW, RH){
  const RHv = RH || 9;
  const apps = appliances || [];
  const out = [];
  (cabinets||[]).forEach(c=>{
    if(c.type!=='base' && c.type!=='upper' && c.type!=='pantry'){ out.push(c); return; } // islands pass through
    const sideWall = c.depth > c.width + 0.01;          // deeper than wide ⇒ runs along a side wall
    const onLeft  = sideWall && c.x < 0.7;
    const onRight = sideWall && !onLeft && (c.x + c.width > RW - 0.7);
    const onBack  = !sideWall && c.z < 0.9;
    if(!onBack && !onLeft && !onRight){ out.push(c); return; }
    const axisOf = a => onBack ? [a.x, a.x + a.width] : [a.z, a.z + (a.depth||2)];
    const onWall = a => onBack ? (a.z < 0.9) : (onLeft ? a.x < 0.9 : (a.x + a.width > RW - 0.9));
    const stoveIv  = apps.filter(a => a.type==='stove'      && onWall(a)).map(axisOf);
    const dwIv     = apps.filter(a => a.type==='dishwasher' && onWall(a)).map(axisOf);
    const fridgeIv = apps.filter(a => a.type==='fridge'     && onWall(a)).map(axisOf);
    const fridges  = apps.filter(a => a.type==='fridge'     && onWall(a));
    // base: carved around stove/fridge/dishwasher. upper: carved around stove, lifted over fridge.
    // pantry/tall: never sits on the floor where the fridge is — the part over the fridge
    // becomes a cabinet ON TOP of the fridge; the rest stays a full-height tower.
    let removeIv, liftIv;
    if(c.type==='base'){ removeIv = stoveIv.concat(fridgeIv, dwIv); liftIv = []; }
    else if(c.type==='upper'){ removeIv = stoveIv; liftIv = fridgeIv; }
    else { removeIv = []; liftIv = fridgeIv; }
    const s   = onBack ? c.x : c.z;
    const len = onBack ? c.width : c.depth;
    const e   = s + len;
    const pts = _edgesWithin(s, e, removeIv.concat(liftIv));
    if(pts.length===2 && !_inAny((s+e)/2, removeIv) && !_inAny((s+e)/2, liftIv)){ out.push(c); return; }
    for(let k=0;k<pts.length-1;k++){
      const a=pts[k], b=pts[k+1]; if(b-a < 0.3) continue;
      const m=(a+b)/2;
      if(_inAny(m, removeIv)) continue;
      const piece = Object.assign({}, c);
      if(onBack){ piece.x=a; piece.width=b-a; } else { piece.z=a; piece.depth=b-a; }
      if(_inAny(m, liftIv)){
        const f = fridges[0] || { height:6.5 };
        const lift = Math.min(Math.max(c.type==='pantry' ? 4.5 : (c.wallHeight||4.5), (f.height||6.5)+0.1), RHv-0.8);
        piece.type = 'upper';        // over-fridge piece sits on top of the fridge
        piece.wallHeight = lift;
        piece.height = RHv - lift;
      }
      out.push(piece);
    }
  });
  return out;
}

// Final collision pass: no two elements may share floor/air space. Appliances win
// (fridge first), so a conflicting cabinet is trimmed to sit BESIDE the obstacle;
// if nothing usable is left it is dropped. Vertical-band aware — a cabinet ABOVE a
// fridge or a base UNDER an upper is not a collision, only same-height overlaps are.
function _bandOf(o, RH, isApp){
  if(isApp){
    if(o.type==='fridge') return [0, o.height||6.7];
    if(o.type==='microwave'||o.type==='hood_fan') return [99,99]; // elevated — ignore
    return [0, o.height||3];
  }
  if(o.type==='upper')  return [o.wallHeight!=null?o.wallHeight:4.5, RH];
  if(o.type==='pantry') return [0, o.height||RH];
  return [0, o.height||3];
}
function _rectOf(o){ return [o.x, o.z, o.x+o.width, o.z+o.depth]; }
function _bandsOverlap(b1,b2){ return b1[0] < b2[1]-0.01 && b2[0] < b1[1]-0.01; }
function _ovl1d(a0,a1,b0,b1){ return Math.min(a1,b1) - Math.max(a0,b0); }
function resolveCabinetOverlaps(cabs, apps, RW, RH){
  const RHv = RH || 9;
  const appObs = (apps||[]).filter(a => a.type!=='microwave' && a.type!=='hood_fan')
    .map(a => ({ rect:_rectOf(a), band:_bandOf(a,RHv,true) }));
  const order = c => (c.type==='pantry'?3 : c.type==='base'?2 : c.type==='upper'?1 : -1);
  const sorted = (cabs||[]).map((c,i)=>({c,i})).sort((A,B)=> (order(B.c)-order(A.c)) || (A.i-B.i));
  const placed = [];
  const result = [];
  sorted.forEach(({c})=>{
    if(c.type!=='base' && c.type!=='upper' && c.type!=='pantry'){
      result.push(c); placed.push({ rect:_rectOf(c), band:_bandOf(c,RHv,false) }); return;
    }
    const onBack = !(c.depth > c.width + 0.01);   // deeper than wide ⇒ side wall (corner-safe)
    const cb = _bandOf(c, RHv, false);
    const cr = _rectOf(c);
    const obstacles = appObs.concat(placed).filter(o => _bandsOverlap(cb, o.band));
    const removals = [];
    obstacles.forEach(o=>{
      if(onBack){
        if(_ovl1d(cr[1],cr[3], o.rect[1],o.rect[3]) <= 0.08) return;  // no depth overlap
        removals.push([o.rect[0], o.rect[2]]);
      } else {
        if(_ovl1d(cr[0],cr[2], o.rect[0],o.rect[2]) <= 0.08) return;
        removals.push([o.rect[1], o.rect[3]]);
      }
    });
    const s = onBack ? c.x : c.z, len = onBack ? c.width : c.depth;
    let segs=[[s, s+len]];
    removals.forEach(rm=>{ const nx=[]; segs.forEach(seg=>{ const a=seg[0], b=seg[1];
      if(rm[1]<=a+0.001 || rm[0]>=b-0.001){ nx.push([a,b]); return; }
      if(rm[0]>a) nx.push([a, Math.max(a,rm[0])]);
      if(rm[1]<b) nx.push([Math.min(b,rm[1]), b]);
    }); segs=nx; });
    segs.filter(seg => seg[1]-seg[0] >= 0.8).forEach(seg=>{   // too small ⇒ removed
      const p = Object.assign({}, c);
      if(onBack){ p.x=seg[0]; p.width=seg[1]-seg[0]; } else { p.z=seg[0]; p.depth=seg[1]-seg[0]; }
      result.push(p); placed.push({ rect:_rectOf(p), band:_bandOf(p,RHv,false) });
    });
  });
  return result;
}

        const nStools  = cab.seating_stools || 0;
        const seatOvhg2 = cab.seating_overhang != null ? cab.seating_overhang : (nStools > 0 ? 1.2 : 0);
        const seatSide = att === 'left' ? '+x' : att === 'right' ? '-x' : '+z';
        const ctY2  = cab.height + 0.045;
        let ctW2 = cab.width + 0.1, ctD2 = cab.depth + 0.14;
        let ctCX = cab.x + cab.width/2, ctCZ = cab.z + cab.depth/2;
        if (seatSide === '+z')      { ctD2 = cab.depth + 0.14 + seatOvhg2; ctCZ = cab.z + cab.depth/2 + seatOvhg2/2; }
        else if (seatSide === '+x') { ctW2 = cab.width + 0.14 + seatOvhg2; ctCX = cab.x + cab.width/2 + seatOvhg2/2; }
        else if (seatSide === '-x') { ctW2 = cab.width + 0.14 + seatOvhg2; ctCX = cab.x + cab.width/2 - seatOvhg2/2; }
        const ct2 = new THREE.Mesh(new THREE.BoxGeometry(ctW2, 0.09, ctD2),
          new THREE.MeshLambertMaterial({ map:marbleTex, color:0xffffff }));
        ct2.position.set(ctCX, ctY2, ctCZ); ct2.castShadow = true; addI(ct2);
        // Waterfall edge only on a free-standing island; attached peninsulas read seamless to the wall
        if (att === 'none' && seatOvhg2 > 0) {
          const wfV = new THREE.Mesh(new THREE.BoxGeometry(ctW2, cab.height + 0.09, 0.05),
            new THREE.MeshLambertMaterial({ map:marbleTex, color:0xffffff }));
          wfV.position.set(cab.x + cab.width/2, (cab.height + 0.09)/2, cab.z - 0.025);
          wfV.castShadow = true; addI(wfV);
        }

        // Kickplate
        const kick2 = new THREE.Mesh(new THREE.BoxGeometry(cab.width, 0.14, 0.04),
          new THREE.MeshLambertMaterial({ color:0x1a1a1a }));
        kick2.position.set(cab.x + cab.width/2, 0.07, cab.z + cab.depth); addI(kick2);

        // Handles both long sides
        const nD2 = Math.max(2, Math.round(cab.width / 1.5));
        const dW2 = cab.width / nD2;
        for (let di = 0; di < nD2; di++) {
          const dc = di*dW2 + dW2/2;
          const bL = Math.min(0.28, dW2 * 0.42);
          [cab.z + cab.depth + 0.04, cab.z - 0.04].forEach(hz => {
            const hm2 = new THREE.Mesh(new THREE.BoxGeometry(bL, 0.03, 0.03), handleMat);
            hm2.position.set(cab.x + dc, cab.height - 0.38, hz); addI(hm2);
          });
        }

        // Bar stools — placed along the open seating side
        const nSt   = nStools;
        const sOvhg = seatOvhg2 > 0 ? seatOvhg2 : 1.2;
        const seatM = new THREE.MeshLambertMaterial({ color:0xc8b89a });
        const legM  = new THREE.MeshLambertMaterial({ color:0x222222 });
        const seatH = 2.5;
        const seatR = 0.42;
        for (let s = 0; s < nSt; s++) {
          let px, pz, bDX = 0, bDZ = 0, sideFacing = false;
          if (seatSide === '+z')      { const spc = cab.width/(nSt+1); px = cab.x + spc*(s+1); pz = cab.z + cab.depth + sOvhg*0.6 + 0.18; bDZ = -0.1; }
          else if (seatSide === '+x') { const spc = cab.depth/(nSt+1); pz = cab.z + spc*(s+1); px = cab.x + cab.width + sOvhg*0.6 + 0.18; bDX = -0.1; sideFacing = true; }
          else                        { const spc = cab.depth/(nSt+1); pz = cab.z + spc*(s+1); px = cab.x - (sOvhg*0.6 + 0.18); bDX = 0.1; sideFacing = true; }
          const seat2 = new THREE.Mesh(new THREE.CylinderGeometry(seatR, seatR, 0.18, 20), seatM);
          seat2.position.set(px, seatH, pz); addI(seat2);
          const rim2 = new THREE.Mesh(new THREE.CylinderGeometry(seatR + 0.03, seatR + 0.03, 0.04, 20), legM);
          rim2.position.set(px, seatH - 0.12, pz); addI(rim2);
          const post2 = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, seatH - 0.22, 12), legM);
          post2.position.set(px, (seatH - 0.22) / 2, pz); addI(post2);
          const footRing = new THREE.Mesh(new THREE.TorusGeometry(seatR * 0.55, 0.035, 8, 24), legM);
          footRing.rotation.x = Math.PI / 2; footRing.position.set(px, seatH * 0.44, pz); addI(footRing);
          const base2 = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.05, 16), legM);
          base2.position.set(px, 0.025, pz); addI(base2);
          const backPanel = new THREE.Mesh(
            sideFacing ? new THREE.BoxGeometry(0.07, 0.42, seatR * 1.6) : new THREE.BoxGeometry(seatR * 1.6, 0.42, 0.07), seatM);
          backPanel.position.set(px + bDX, seatH + 0.35, pz + bDZ); addI(backPanel);
          const backPost = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.42, 8), legM);
          backPost.position.set(px + bDX, seatH + 0.12, pz + bDZ); addI(backPost);
        }

        islandMeshes.current.push({ mesh, group:iGroup, cabIdx });

        // ── ISLAND SINK ────────────────────────────────────────────
        // Render an integrated basin if the cabinet is flagged has_sink OR a
        // sink appliance sits on top of this island. Built into the island
        // group so it moves with the island when dragged.
        const islandSinkApp = (layout.appliances||[]).find(a => a.type === "sink" && isInsideIsland(a, cab));
        if (cab.has_sink || islandSinkApp) {
          const sx = cab.x + cab.width * 0.5, sz = cab.z + cab.depth * 0.5;
          const bw = cab.width * 0.4, bd = cab.depth * 0.5;
          // stainless rim flush with the counter
          const rim = new THREE.Mesh(new THREE.BoxGeometry(bw+0.07, 0.03, bd+0.07), new THREE.MeshLambertMaterial({ color:0xb8bcc0 }));
          rim.position.set(sx, ctY2+0.05, sz); addI(rim);
          // recessed dark basin set into the counter
          const sinkBasin = new THREE.Mesh(new THREE.BoxGeometry(bw, 0.18, bd), new THREE.MeshLambertMaterial({ color:0x3a3e42 }));
          sinkBasin.position.set(sx, ctY2 - 0.04, sz); addI(sinkBasin);
          // Faucet
          const faucetBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.05,0.16,10), new THREE.MeshLambertMaterial({ color:0xc4c8cc }));
          faucetBase.position.set(sx, ctY2 + 0.13, sz - bd*0.4); addI(faucetBase);
          const faucetSpout = new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,bd*0.6,10), new THREE.MeshLambertMaterial({ color:0xc4c8cc }));
          faucetSpout.rotation.x = Math.PI / 2.3;
          faucetSpout.position.set(sx, ctY2 + 0.34, sz - bd*0.2); addI(faucetSpout);
        }

        return; // all island geometry done

      } else {
        // Non-island: add body + edge normally
        cabGroup.add(mesh);
        const edgeN = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color:0xd0cdc7 }));
        edgeN.position.copy(mesh.position); cabGroup.add(edgeN);
      }

      // ── RAISED PANEL door insets ───────────────────────────────────
      if (isBase || isUpper) {
        const onRight = (cab.x + cab.width > RW - 0.7) && (cab.depth >= cab.width);
        const onLeft  = !onRight && (cab.x < 0.7) && (cab.depth >= cab.width);
        const onBack  = !onRight && !onLeft && (cab.z < 0.7);
        const runLen  = onBack ? cab.width : cab.depth;
        const nDoors  = Math.max(1, Math.round(runLen / 1.5));
        const dW      = runLen / nDoors;
        const panMat    = new THREE.LineBasicMaterial({ color:0xb0aca6 });
        const drawerMat = new THREE.LineBasicMaterial({ color:0xb0aca6 });
        const wallAppliances = (layout.appliances||[]).filter(a =>
          a.type !== "hood_fan" && a.type !== "microwave"
        );
        // DRAWER BANK: 3 sections wide, centered between fridge right edge and stove left edge
        let drawerStartIdx = -1, drawerEndIdx = -2; // default: no drawers
        if (isBase && onBack) {
          const fridgeApp = (layout.appliances||[]).find(a => a.type === "fridge" && a.z < 0.7);
          const stoveApp2 = (layout.appliances||[]).find(a => a.type === "stove" && a.z < 0.7);
          if (fridgeApp && stoveApp2) {
            const centerX = (fridgeApp.x + fridgeApp.width + stoveApp2.x) / 2;
            const centerIdx = Math.round((centerX - cab.x) / dW - 0.5);
            const bankW = 2; // two-section wide drawer bank
            drawerStartIdx = Math.max(0, centerIdx - Math.floor(bankW / 2));
            drawerEndIdx   = drawerStartIdx + bankW - 1;
          }
        }

        for (let di=0; di<nDoors; di++) {
          const dc        = di*dW + dW/2;
          const panelPos  = cab.x + (onBack ? dc : 0);
          const panelPosZ = cab.z + (onBack ? 0 : dc);
          const blocked = wallAppliances.some(a => {
            const half = dW * 0.36; // half of panel width (pW/2 = dW*0.72/2)
            if (onBack)  return (panelPos  + half > a.x + 0.02) && (panelPos  - half < a.x + a.width  - 0.02) && a.z < 0.7;
            if (onLeft)  return (panelPosZ + half > a.z + 0.02) && (panelPosZ - half < a.z + a.depth  - 0.02) && a.x < 0.7;
            if (onRight) return (panelPosZ + half > a.z + 0.02) && (panelPosZ - half < a.z + a.depth  - 0.02) && a.x + a.width > RW - 0.7;
            return false;
          });
          if (blocked) continue;

          const pW   = dW * 0.72;
          const faceZ = onBack ? cab.z + cab.depth + 0.012
                      : onLeft ? cab.x + cab.width + 0.012
                      : cab.x - 0.012;

          if (isBase && !isIsland && di >= drawerStartIdx && di <= drawerEndIdx) {
            // ── ONE DRAWER BANK: 3 stacked horizontal drawer faces ──────────
            [effH * 0.22, effH * 0.52, effH * 0.80].forEach(dh => {
              const drGeo  = new THREE.EdgesGeometry(new THREE.BoxGeometry(
                onBack ? pW : 0.015, effH * 0.19, onBack ? 0.015 : pW));
              const drLine = new THREE.LineSegments(drGeo, drawerMat);
              if (onBack)      drLine.position.set(cab.x + dc, dh, faceZ);
              else if (onLeft) drLine.position.set(faceZ, dh, cab.z + dc);
              else             drLine.position.set(faceZ, dh, cab.z + dc);
              cabGroup.add(drLine);
            });
          } else {
            // ── DOOR PANEL: single tall raised-panel inset ──────────────────
            const pH    = effH * 0.70;
            const panGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(
              onBack ? pW : 0.015, pH, onBack ? 0.015 : pW));
            const panLine = new THREE.LineSegments(panGeo, panMat);
            if (onBack)      panLine.position.set(cab.x + dc, yPos, faceZ);
            else if (onLeft) panLine.position.set(faceZ, yPos, cab.z + dc);
            else             panLine.position.set(faceZ, yPos, cab.z + dc);
            cabGroup.add(panLine);
          }
        }
      }

      // Marble countertop — seamless at L-corners, split around stove
      if (!isUpper) {
        const seatOvhg = (isIsland && cab.seating_overhang) ? cab.seating_overhang : 0;
        const onRight = (cab.x + cab.width > RW - 0.7) && (cab.depth >= cab.width);
        const onLeft  = !onRight && (cab.x < 0.7) && (cab.depth >= cab.width);
        const onBack  = !onRight && !onLeft && (cab.z < 0.7);

        const zStart  = (onLeft || onRight) ? 0 : cab.z;
        const zEnd    = cab.z + cab.depth + (isIsland ? 0.1 + seatOvhg : 0.14);
        const ctW_full = cab.width + (isIsland ? 0.1 : 0.06);
        const ctD     = zEnd - zStart;
        const ctY     = cab.height + 0.045 - ((onLeft || onRight) ? 0.001 : 0);
        const ctCZ    = zStart + ctD / 2 + (onBack ? 0.04 : 0);
        const ctMat   = new THREE.MeshLambertMaterial({ map: marbleTex, color: 0xffffff });

        // Find any stove that overlaps this cabinet's x-range (back-wall only)
        const stove = onBack ? (layout.appliances||[]).find(a =>
          a.type === "stove" &&
          a.x >= cab.x - 0.1 && a.x + a.width <= cab.x + cab.width + 0.1
        ) : null;

        if (stove) {
          // Left segment: cab.x → stove.x
          const leftW = stove.x - cab.x;
          if (leftW > 0.05) {
            const seg = new THREE.Mesh(new THREE.BoxGeometry(leftW, 0.09, ctD), ctMat);
            seg.position.set(cab.x + leftW/2, ctY, ctCZ);
            seg.castShadow = true; cabGroup.add(seg);
          }
          // Right segment: stove.x+stove.width → cab.x+cab.width
          const rightStart = stove.x + stove.width;
          const rightW = (cab.x + cab.width + 0.06) - rightStart;
          if (rightW > 0.05) {
            const seg = new THREE.Mesh(new THREE.BoxGeometry(rightW, 0.09, ctD), ctMat);
            seg.position.set(rightStart + rightW/2, ctY, ctCZ);
            seg.castShadow = true; cabGroup.add(seg);
          }
          // ── COOKTOP — flush with marble countertop, full stove footprint ──
          const cooktopMat  = new THREE.MeshBasicMaterial({ color:0x111111 });
          // Same Y center and thickness as the marble slab (ctY / 0.09) so it's perfectly flush
          const cooktop = new THREE.Mesh(
            new THREE.BoxGeometry(stove.width, 0.09, ctD),
            cooktopMat
          );
          cooktop.position.set(stove.x + stove.width/2, ctY, ctCZ);
          cooktop.castShadow = true; cabGroup.add(cooktop);
          // 4 burner rings — sit on top of cooktop surface
          const burnerMat  = new THREE.MeshBasicMaterial({ color:0x1e1e1e });
          const burnerGlow = new THREE.MeshBasicMaterial({ color:0x141414 });
          const burnerTopY = ctY + 0.048; // just above cooktop top face
          [[-0.28,-0.26],[0.28,-0.26],[-0.28,0.22],[0.28,0.22]].forEach(([bx,bz]) => {
            const cx2 = stove.x + stove.width/2 + bx * stove.width;
            const cz2 = stove.z + stove.depth/2 + bz * stove.depth;
            // Outer ring
            const outer = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.025, 20), burnerMat);
            outer.position.set(cx2, burnerTopY, cz2); cabGroup.add(outer);
            // Inner disc
            const inner = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.028, 16), burnerGlow);
            inner.position.set(cx2, burnerTopY + 0.002, cz2); cabGroup.add(inner);
            // Centre knob
            const knob = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.016, 10), cooktopMat);
            knob.position.set(cx2, burnerTopY + 0.022, cz2); cabGroup.add(knob);
          });
        } else {
          // No stove overlap — full slab as before
          const ct = new THREE.Mesh(new THREE.BoxGeometry(ctW_full, 0.09, ctD), ctMat);
          ct.position.set(cab.x + cab.width / 2, ctY, ctCZ);
          ct.castShadow = true; cabGroup.add(ct);
        }
      }
      if (isBase) {
        const kick = new THREE.Mesh(new THREE.BoxGeometry(cab.width,0.14,0.04),
          new THREE.MeshLambertMaterial({ color:0x1a1a1a }));
        kick.position.set(cab.x+cab.width/2, 0.07, cab.z+cab.depth); cabGroup.add(kick);
      }

      // ── HANDLES ───────────────────────────────────────────────────
      if (!isIsland) {
        const onRight = (cab.x + cab.width > RW - 0.7) && (cab.depth >= cab.width);
        const onLeft  = !onRight && (cab.x < 0.7) && (cab.depth >= cab.width);
        const onBack  = !onRight && !onLeft && (cab.z < 0.7);
        const runLen  = onBack ? cab.width : cab.depth;
        const nDoors  = Math.max(1, Math.round(runLen / 1.5));
        const dSize   = runLen / nDoors;
        const barLen  = Math.min(0.28, dSize * 0.42);
        const hY      = isUpper ? wh+0.38 : cab.height-0.38;
        for (let di=0; di<nDoors; di++) {
          const dc = di*dSize + dSize/2;
          const hm = new THREE.Mesh(
            onBack ? new THREE.BoxGeometry(barLen,0.03,0.03) : new THREE.BoxGeometry(0.03,0.03,barLen),
            handleMat);
          hm.position.set(
            onBack ? cab.x+dc : (onLeft ? cab.x+cab.width+0.04 : cab.x-0.04),
            hY,
            onBack ? cab.z+cab.depth+0.04 : cab.z+dc);
          cabGroup.add(hm);
        }
      }

      // ── ISLAND HANDLES + BAR STOOLS: handled in island group above ──────
      // (skipped — all island geometry is built in the iGroup block)
      if (!isIsland) {
        const onRight2 = (cab.x + cab.width > RW - 0.7) && (cab.depth >= cab.width);
        const onLeft2  = !onRight2 && (cab.x < 0.7) && (cab.depth >= cab.width);
        const onBack2  = !onRight2 && !onLeft2 && (cab.z < 0.7);
        const runLen2  = onBack2 ? cab.width : cab.depth;
        const nDoors2  = Math.max(1, Math.round(runLen2 / 1.5));
        const dSize2   = runLen2 / nDoors2;
        const barLen2  = Math.min(0.28, dSize2 * 0.42);
        const hY2      = isUpper ? wh+0.38 : cab.height-0.38;
        for (let di=0; di<nDoors2; di++) {
          const dc = di*dSize2 + dSize2/2;
          const hm2 = new THREE.Mesh(
            onBack2 ? new THREE.BoxGeometry(barLen2,0.03,0.03) : new THREE.BoxGeometry(0.03,0.03,barLen2),
            handleMat);
          hm2.position.set(
            onBack2 ? cab.x+dc : (onLeft2 ? cab.x+cab.width+0.04 : cab.x-0.04),
            hY2,
            onBack2 ? cab.z+cab.depth+0.04 : cab.z+dc);
          cabGroup.add(hm2);
        }
      }

      // ── CROWN MOLDING on upper cabs ────────────────────────────────
      if (isUpper) {
        const onRight = (cab.x + cab.width > RW - 0.7) && (cab.depth >= cab.width);
        const onLeft  = !onRight && (cab.x < 0.7) && (cab.depth >= cab.width);
        const onBack  = !onRight && !onLeft && (cab.z < 0.7);
        const molH = 0.13, ov = 0.09;
        const molGeo  = new THREE.BoxGeometry(cab.width+(onBack?ov*0.5:molH), molH, cab.depth+ov);
        const molMesh = new THREE.Mesh(molGeo, new THREE.MeshLambertMaterial({ color:0xfaf8f3 }));
        molMesh.position.set(
          cab.x+cab.width/2 + (onLeft?ov/2:onRight?-ov/2:0),
          RH-molH/2,
          cab.z+cab.depth/2 + (onBack?ov/2:0));
        molMesh.castShadow=true; cabGroup.add(molMesh);
        const molEdge = new THREE.LineSegments(new THREE.EdgesGeometry(molGeo), new THREE.LineBasicMaterial({ color:0xc8c5bf }));
        molEdge.position.copy(molMesh.position); cabGroup.add(molEdge);
      }
    });

    // ── APPLIANCES ──────────────────────────────────────────────────────
    const appColor = { fridge:0x1a1a1a, stove:0x1a1a1a, sink:0x565656, dishwasher:0x1a1a1a };
    (layout.appliances||[]).forEach(app => {

      // ── MICROWAVE: integrated into upper cabinet — skip 3D body ─────────
      if (app.type === "microwave") {
        return; // Microwave is part of the upper cabinet run, shown in floor plan/schedule
      }

      // ── ISLAND SINK: drawn as an integrated basin on the island group ───
      if (app.type === "sink" && (layout.cabinets||[]).some(c => c.type === "island" && isInsideIsland(app, c))) {
        return; // handled in the island block so it moves with the island
      }

      // ── WALL SINK: basin set into the counter + faucet (no floating box). ──
      // The base cabinet beneath it (never carved away for a sink) provides the
      // body and countertop, so we only draw the basin and tap on top.
      if (app.type === "sink") {
        const ctY = (app.height || 3) + 0.045;            // base countertop surface
        const cx  = app.x + app.width/2;
        const cz  = app.z + (app.depth||2)/2;
        const bw  = app.width * 0.6, bd = (app.depth||2) * 0.5;
        // stainless rim flush with the counter
        const rim = new THREE.Mesh(new THREE.BoxGeometry(bw+0.07, 0.03, bd+0.07), new THREE.MeshLambertMaterial({ color:0xb8bcc0 }));
        rim.position.set(cx, ctY+0.05, cz); appGroup.add(rim);
        // basin recess sunk just below the counter
        const basin = new THREE.Mesh(new THREE.BoxGeometry(bw, 0.18, bd), new THREE.MeshLambertMaterial({ color:0x3a3e42 }));
        basin.position.set(cx, ctY-0.04, cz); appGroup.add(basin);
        // faucet base + spout, set toward the back of the counter
        const fz = app.z + (app.depth||2) * 0.22;
        const faucetBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.05,0.16,10), new THREE.MeshLambertMaterial({ color:0xc4c8cc }));
        faucetBase.position.set(cx, ctY+0.13, fz); appGroup.add(faucetBase);
        const spout = new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,(app.depth||2)*0.3,10), new THREE.MeshLambertMaterial({ color:0xc4c8cc }));
        spout.rotation.x = Math.PI / 2.3;
        spout.position.set(cx, ctY+0.34, app.z + (app.depth||2) * 0.36); appGroup.add(spout);
        return;
      }

      // ── HOOD FAN: pyramid chimney ────────────────────────────────────
      if (app.type === "hood_fan") {
        const cx=app.x+app.width/2, cz=app.z+app.depth/2;
        const botW=app.width, botD=app.depth;
        const topW=app.width*0.38, topD=app.depth*0.5;
        // 28" clearance from stove top to hood bottom
        const stoveApp = (layout.appliances||[]).find(a => a.type === "stove");
        const stoveTop = stoveApp ? stoveApp.height : 3.0;
        const baseY = stoveTop + (28/12);   // 28 inches = 2.333 ft above stove
        const taperH = 1.4;                  // canopy taper height
        const topY   = baseY + taperH;       // top of canopy / bottom of duct
        const mat  = new THREE.MeshLambertMaterial({ color:0x1a1a1a, side:THREE.DoubleSide });
        // Pyramid frustum
        const bx1=cx-botW/2,bx2=cx+botW/2,bz1=cz-botD/2,bz2=cz+botD/2;
        const tx1=cx-topW/2,tx2=cx+topW/2,tz1=cz-topD/2,tz2=cz+topD/2;
        const v = new Float32Array([
          bx1,baseY,bz2, bx2,baseY,bz2, tx2,topY,tz2, bx1,baseY,bz2, tx2,topY,tz2, tx1,topY,tz2,
          bx2,baseY,bz1, bx1,baseY,bz1, tx1,topY,tz1, bx2,baseY,bz1, tx1,topY,tz1, tx2,topY,tz1,
          bx1,baseY,bz1, bx1,baseY,bz2, tx1,topY,tz2, bx1,baseY,bz1, tx1,topY,tz2, tx1,topY,tz1,
